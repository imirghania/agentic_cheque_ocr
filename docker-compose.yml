services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cheque-ocr-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: cheque-ocr-ui
    env_file:
      - .env
    ports:
      - "8501:8501"
    environment:
      - SERVER_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    restart: unless-stopped
